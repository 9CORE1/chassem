    <style>
        :root {
            --font-family-ko: 'Noto Sans KR', sans-serif;
            /* Harmonizes with the rich terracotta brown jacket and warm red inner shirt in the photo */
            --bg-gradient: radial-gradient(circle at center, #8a3f29 0%, #3d150b 100%);
            --button-bg: #ffffff;
            --button-text: #000000;
            --button-border: #000000;
            --text-primary: #ffffff; /* White text for excellent contrast on dark background */
            --text-secondary: #ebdcd7; /* Warm light beige secondary text */
            --card-shadow: 4px 4px 0px #000000;
            --transition: all 0.15s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family-ko);
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 1rem 1.25rem 1rem 1.25rem;
            overflow-x: hidden;
            position: relative;
        }

        /* Container */
        .container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            min-height: auto;
            padding-top: 3rem;
        }

        /* Home Return Button (Top Left) */
        .home-btn {
            position: absolute;
            top: 1rem;
            left: 1.25rem;
            background: rgba(255, 255, 255, 0.15);
            color: var(--text-primary);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-decoration: none;
            transition: var(--transition);
            z-index: 10;
        }

        .home-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.08);
        }

        .home-btn i {
            font-size: 1rem;
        }

        /* Profile Section */
        .profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 1.25rem;
            text-align: center;
        }

        .avatar-wrapper {
            position: relative;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            overflow: hidden;
            margin-bottom: 0.75rem;
            border: 2px solid rgba(255, 255, 255, 0.35);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            left: 7px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .username {
            font-size: 1.65rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            margin-bottom: 0.25rem;
            color: var(--text-primary);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.15);
        }

        .subtitle {
            font-size: 0.98rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.15);
        }

        /* Social Icons */
        .social-icons {
            display: flex;
            gap: 1.25rem;
            margin-bottom: 0.5rem;
        }

        .social-icon {
            color: var(--text-primary);
            font-size: 1.75rem;
            transition: var(--transition);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
        }

        .social-icon:hover {
            transform: scale(1.15);
            color: #ffaca0; /* Soft warm coral/red matching the inner shirt red for hover effect */
        }

        /* Links List */
        .links-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 0.5rem;
        }

        /* Link Card */
        .link-card {
            width: 100%;
            height: 64px;
            background: var(--button-bg);
            border-radius: 12px;
            color: var(--button-text);
            text-decoration: none;
            display: flex;
            align-items: center;
            padding: 0.5rem 1rem;
            border: 2px solid var(--button-border);
            box-shadow: var(--card-shadow);
            transition: var(--transition);
            position: relative;
        }

        .link-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px #000000;
        }

        .link-card:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000000;
        }

        .link-thumb {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            object-fit: cover;
            margin-right: 1rem;
            flex-shrink: 0;
            border: 1px solid #f0f0f0;
            background-color: #ffffff;
        }

        .logo-img {
            object-fit: contain;
            padding: 2px;
        }

        .link-text {
            flex-grow: 1;
            font-size: 0.98rem;
            font-weight: 500;
            color: #000000;
            text-align: left;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.35;
        }

        .more-btn {
            color: #8e8e93;
            font-size: 1.15rem;
            flex-shrink: 0;
            margin-left: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 20px;
        }

        .link-card:hover .more-btn {
            color: #000000;
        }



        /* Toast notification for sharing */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
            z-index: 1000;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>

    <!-- Toast Notification -->
    <div id="share-toast" class="toast">

    </div>

    <script>
        function copyLinkTreeUrl() {
            const dummy = document.createElement('input');
            const text = window.location.href;
            
            document.body.appendChild(dummy);
            dummy.value = text;
            dummy.select();
            
            try {
                document.execCommand('copy');
                const toast = document.getElementById('share-toast');
                toast.classList.add('show');
                
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            } catch (err) {
                console.error('URL 복사 실패:', err);
            } finally {
                document.body.removeChild(dummy);
            }
        }
        function handleHomeClick(event) {
            if (window.self !== window.top) {
                event.preventDefault();
                window.parent.postMessage('close-linktree-modal', '*');
            }
        }
    </script>
