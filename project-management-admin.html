    <!-- Script Block -->
    <script>
        // 1. Authorization check
        if (sessionStorage.getItem('isAdminMode') !== 'true' && localStorage.getItem('isAdminMode') !== 'true') {
            alert('관리자 로그인이 필요합니다. 메인 페이지로 이동합니다.');
            window.location.href = 'index.html';
        } else {
            sessionStorage.setItem('isAdminMode', 'true');
            localStorage.setItem('isAdminMode', 'true');
        }

        // Global State variables
        let coursesData = [];
        let portfolioData = [];
        let journeyData = [];
        let competenciesData = [];
        let popupConfig = {};
        let editingCourseId = null;

        // Utility to clean large base64 strings before saving to localStorage (prevent QuotaExceededError)
        function cleanDataForLocalStorage(data) {
            if (!data) return data;
            try {
                const clone = JSON.parse(JSON.stringify(data));
                const cleanObj = (obj) => {
                    if (Array.isArray(obj)) {
                        obj.forEach((item, idx) => {
                            if (typeof item === 'object') {
                                cleanObj(item);
                            } else if (typeof item === 'string' && item.startsWith('data:image/')) {
                                obj[idx] = 'images/project_management_banner.jpg';
                            }
                        });
                    } else if (obj && typeof obj === 'object') {
                        for (let key in obj) {
                            if (typeof obj[key] === 'object') {
                                cleanObj(obj[key]);
                            } else if (typeof obj[key] === 'string' && obj[key].startsWith('data:image/')) {
                                if (key === 'bannerUrl' || key === 'imageUrl') {
                                    obj[key] = 'images/project_management_banner.jpg';
                                } else {
                                    obj[key] = '';
                                }
                            }
                        }
                    }
                };
                cleanObj(clone);
                return clone;
            } catch (e) {
                console.warn('cleanDataForLocalStorage 실패:', e);
                return data;
            }
        }

        // Wrapper for localStorage.setItem to avoid QuotaExceededError
        function safeSaveToLocalStorage(key, data) {
            try {
                if (typeof data === 'string') {
                    localStorage.setItem(key, data);
                    return;
                }
                const cleaned = cleanDataForLocalStorage(data);
                localStorage.setItem(key, JSON.stringify(cleaned));
            } catch (e) {
                console.error(`localStorage 저장 실패 (키: ${key}):`, e);
                if (e.name === 'QuotaExceededError' || e.code === 22) {
                    console.warn('localStorage 한도 초과로 불필요한 백업 데이터를 정리합니다.');
                    try {
                        localStorage.removeItem('portfolioData');
                        localStorage.removeItem('journeyData');
                        localStorage.removeItem('competenciesData');
                    } catch (err) {}
                }
            }
        }

        // Compress uploaded image using canvas to JPEG format, reducing file size and memory footprint
        function compressImageToJpeg(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        
                        const max_size = 1280;
                        if (width > max_size || height > max_size) {
                            if (width > height) {
                                height = Math.round((height * max_size) / width);
                                width = max_size;
                            } else {
                                width = Math.round((width * max_size) / height);
                                height = max_size;
                            }
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        
                        const ctx = canvas.getContext('2d');
                        // Fill white background for JPEGs to prevent black background on PNG transparency
                        ctx.fillStyle = '#ffffff';
                        ctx.fillRect(0, 0, width, height);
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.8);
                        resolve(compressedBase64);
                    };
                    img.onerror = (err) => reject(err);
                };
                reader.onerror = (err) => reject(err);
            });
        }

        // 2. Theme Initialization
        const themeToggle = document.getElementById('theme-toggle');
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            document.body.classList.remove('dark-mode');
            document.body.classList.add('light-mode');
            if (themeToggle) themeToggle.innerHTML = '<i class="fa-solid fa-sun"></i>';
        } else {
            document.body.classList.remove('light-mode');
            document.body.classList.add('dark-mode');
            if (themeToggle) themeToggle.innerHTML = '<i class="fa-solid fa-moon"></i>';
        }

        if (themeToggle) {
            themeToggle.addEventListener('click', () => {
                if (document.body.classList.contains('light-mode')) {
                    document.body.classList.remove('light-mode');
                    document.body.classList.add('dark-mode');
                    themeToggle.innerHTML = '<i class="fa-solid fa-moon"></i>';
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.body.classList.remove('dark-mode');
                    document.body.classList.add('light-mode');
                    themeToggle.innerHTML = '<i class="fa-solid fa-sun"></i>';
                    localStorage.setItem('theme', 'light');
                }
            });
        }

        // 3. Mobile Menu Toggle
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const navMenu = document.getElementById('nav-menu');
        if (mobileMenuBtn && navMenu) {
            mobileMenuBtn.addEventListener('click', () => {
                mobileMenuBtn.classList.toggle('active');
                navMenu.classList.toggle('active');
            });
        }

        // Logout
        function handleLogout() {
            sessionStorage.removeItem('isAdminMode');
            localStorage.removeItem('isAdminMode');
            alert('관리자 센터에서 로그아웃 되었습니다.');
            window.location.href = 'index.html';
        }

        // 4. Data Loading
        document.addEventListener('DOMContentLoaded', () => {
            const hasUnsaved = localStorage.getItem('hasUnsavedChanges') === 'true';
            
            if (hasUnsaved) {
                console.log('로컬에 저장된 미동기화 변경사항을 복원합니다.');
                try {
                    const localPortfolio = localStorage.getItem('portfolioData');
                    const localJourney = localStorage.getItem('journeyData');
                    const localCompetencies = localStorage.getItem('competenciesData');
                    const localPopup = localStorage.getItem('popupConfig');
                    const localCourses = localStorage.getItem('coursesData');
                    
                    if (localPortfolio && localJourney && localCompetencies && localCourses) {
                        portfolioData = JSON.parse(localPortfolio) || [];
                        journeyData = JSON.parse(localJourney) || [];
                        competenciesData = JSON.parse(localCompetencies) || [];
                        popupConfig = localPopup ? JSON.parse(localPopup) : {};
                        coursesData = JSON.parse(localCourses) || [];
                        
                        // Ensure they are arrays to prevent mapping errors
                        if (!Array.isArray(portfolioData)) portfolioData = [];
                        if (!Array.isArray(journeyData)) journeyData = [];
                        if (!Array.isArray(competenciesData)) competenciesData = [];
                        if (!Array.isArray(coursesData)) coursesData = [];
                        
                        loadApplicantsAndRender();
                        showUnsavedWarningBanner();
                        return;
                    }
                } catch (e) {
                    console.error('로컬스토리지 데이터 복구 실패 (서버에서 다시 로드):', e);
                }
            }
            
            loadFromServer();
        });

        function showUnsavedWarningBanner() {
            if (document.getElementById('unsaved-warning-banner')) return;
            const banner = document.createElement('div');
            banner.id = 'unsaved-warning-banner';
            banner.style.cssText = 'background: #e11d48; color: white; padding: 0.5rem 1rem; font-size: 0.85rem; font-weight: 600; text-align: center; position: fixed; bottom: 0; left: 0; width: 100%; z-index: 9999; display: flex; align-items: center; justify-content: center; gap: 1rem;';
            banner.innerHTML = `
                <span>⚠️ 현재 브라우저에 아직 서버로 동기화되지 않은 변경사항(신규 강좌 등)이 있습니다.</span>
                <button onclick="updateServerGithub()" class="btn" style="background: white; color: #e11d48; border: none; padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.75rem; font-weight: 700; cursor: pointer;">서버 업데이트 하기</button>
            `;
            document.body.appendChild(banner);
        }

        function loadFromServer() {
            fetch('data.json')
                .then(res => {
                    if (!res.ok) throw new Error('서버 데이터 로드 실패');
                    return res.json();
                })
                .then(data => {
                    portfolioData = data.portfolioData || [];
                    journeyData = data.journeyData || [];
                    competenciesData = data.competenciesData || [];
                    popupConfig = data.popupConfig || {};
                    coursesData = data.coursesData || [];
                    
                    if (coursesData.length === 0 && data.courseConfig) {
                        coursesData = [{ id: "project-management", ...data.courseConfig }];
                    }
                    
                    safeSaveToLocalStorage('portfolioData', portfolioData);
                    safeSaveToLocalStorage('journeyData', journeyData);
                    safeSaveToLocalStorage('competenciesData', competenciesData);
                    safeSaveToLocalStorage('popupConfig', popupConfig);
                    safeSaveToLocalStorage('coursesData', coursesData);
                    safeSaveToLocalStorage('hasUnsavedChanges', 'false');
                    
                    loadApplicantsAndRender();
                })
                .catch(err => {
                    console.warn('data.json 로드 실패, 로컬 백업 복원:', err);
                    const localCourses = localStorage.getItem('coursesData');
                    if (localCourses) {
                        coursesData = JSON.parse(localCourses);
                    }
                    loadApplicantsAndRender();
                });
        }

        function syncPopupConfigWithCoursesData() {
            if (popupConfig && popupConfig.title) {
                const courseId = popupConfig.linkProjectId || 'project-management';
                let existingCourse = coursesData.find(c => c.id === courseId);
                
                const syncCourse = {
                    id: courseId,
                    tag: (existingCourse && existingCourse.tag) || 'IT & PM 실무 특강',
                    title: popupConfig.title,
                    bannerUrl: popupConfig.imageUrl || (existingCourse && existingCourse.bannerUrl) || 'images/project_management_banner.jpg',
                    schedule: (existingCourse && existingCourse.schedule) || '매주 토요일 (4주 완성)',
                    time: (existingCourse && existingCourse.time) || '10:00 - 13:00 (3시간)',
                    instructor: (existingCourse && existingCourse.instructor) || '차은정 대표',
                    description: popupConfig.content || (existingCourse && existingCourse.description) || '공지사항으로 등록된 강좌 상세 내용입니다.',
                    curriculum: (existingCourse && existingCourse.curriculum) || [
                        { week: 'Week 1', title: 'PM 기초 및 프로젝트 범위(Scope) 설정', desc: '프로젝트 라이프사이클의 이해 WBS(작업분할구조도) 실습.' },
                        { week: 'Week 2', title: '프로젝트 일정 및 리스크 관리', desc: '의존성 분석을 통한 일정 네트워크 설계, 리스크 식별 및 정량/정성 평가 기법.' },
                        { week: 'Week 3', title: '애자일 방법론 & 스크럼 실무', desc: '애자일 선언과 4대 가치 이해, 스크럼 프레임워크(스프린트 기획, 데일리 스크럼) 실습.' },
                        { week: 'Week 4', title: '협업 툴 실습 (Jira & Confluence)', desc: 'Jira 백로그 작성 및 스프린트 구동, Confluence 문서 협업 실습.' }
                    ]
                };
                
                if (existingCourse) {
                    coursesData = coursesData.map(c => c.id === courseId ? syncCourse : c);
                } else {
                    coursesData.push(syncCourse);
                }
                safeSaveToLocalStorage('coursesData', coursesData);
            }
        }

        function loadApplicantsAndRender() {
            syncPopupConfigWithCoursesData();
            fetch('/api/applications')
                .then(res => {
                    if (!res.ok) throw new Error('신청 목록 로드 실패');
                    return res.json();
                })
                .then(apps => {
                    renderCourseAdminDashboardWithApps(apps);
                })
                .catch(err => {
                    console.warn('신청 목록 로드 실패, 로컬 스토리지 확인:', err);
                    const localApps = JSON.parse(localStorage.getItem('courseApplications') || '[]');
                    renderCourseAdminDashboardWithApps(localApps);
                });
        }

        function renderCourseAdminDashboardWithApps(apps) {
            const dashboardContainer = document.getElementById('course-admin-dashboard');
            if (!dashboardContainer) return;
            
            // Build Course Cards List (썸네일 형태)
            let coursesHtml = '';
            
            if (coursesData.length === 0) {
                coursesHtml = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 4rem 2rem; background: rgba(255,255,255,0.02); border: 2px dashed var(--border-color); border-radius: 16px; color: var(--text-muted); display: flex; flex-direction: column; align-items: center; gap: 1rem;">
                        <i class="fa-solid fa-graduation-cap" style="font-size: 3rem; color: var(--text-muted); opacity: 0.4;"></i>
                        <div>
                            <p style="font-weight: 700; color: var(--text-primary); font-size: 1.1rem; margin-bottom: 0.25rem;">등록된 운영 강좌가 없습니다</p>
                            <p style="font-size: 0.85rem; color: var(--text-muted);">[강좌 추가] 버튼을 눌러 첫 강좌를 추가해보세요.</p>
                        </div>
                        <button onclick="showIntegratedConfigForm(null)" class="btn btn-primary" style="font-size: 0.85rem; padding: 0.5rem 1.25rem; display: flex; align-items: center; gap: 0.35rem; border-radius: 8px; border: none; background: linear-gradient(135deg, var(--color-career-start), var(--color-career-end)); color: white; cursor: pointer; font-weight: 600; box-shadow: 0 4px 10px rgba(225,0,255,0.15);">
                            <i class="fa-solid fa-plus"></i> 첫 강좌 추가하기
                        </button>
                    </div>
                `;
            } else {
                coursesData.forEach(c => {
                    coursesHtml += `
                        <div class="glass-panel" style="padding: 1.5rem; border-radius: 20px; background: var(--bg-secondary); border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 1.25rem;">

        window.saveIntegratedConfig = function(event) {
            if (event) event.preventDefault();
            try {
                const titleInput = document.getElementById('popup-config-title');
                const contentInput = document.getElementById('popup-config-content');
                const linkUrlInput = document.getElementById('popup-config-link-url');
                const detailTextInput = document.getElementById('course-detail-text');

                if (!titleInput || !titleInput.value.trim()) {
                    alert('강좌명/팝업 제목을 입력해 주세요.');
                    return;
                }
                if (!detailTextInput || !detailTextInput.value.trim()) {
                    alert('강좌 세부내용 텍스트를 입력해 주세요.');
                    return;
                }

                const previewImg = document.getElementById('course-banner-preview');
                const bannerUrl = (previewImg && (previewImg.src.startsWith('data:') || previewImg.src.startsWith('images/') || previewImg.src.startsWith('http'))) ? previewImg.src : 'images/project_management_banner.jpg';
                
                const detailPreviewImg = document.getElementById('course-detail-preview');
                const detailImageUrl = (detailPreviewImg && (detailPreviewImg.src.startsWith('data:') || detailPreviewImg.src.startsWith('images/') || detailPreviewImg.src.startsWith('http'))) ? detailPreviewImg.src : '';

                const tagInput = document.getElementById('course-tag');
                const instructorInput = document.getElementById('course-instructor');
                const scheduleInput = document.getElementById('course-schedule');
                const timeInput = document.getElementById('course-time');

                // 1. Create/Update Course
                const id = editingCourseId || ('course-' + new Date().getTime());
                
                const existingCourse = coursesData.find(c => c.id === id) || {};
                const syncCourse = {
                    id: id,
                    tag: tagInput ? tagInput.value.trim() : (existingCourse.tag || 'IT & PM 실무 특강'),
                    title: titleInput.value.trim(),
                    bannerUrl: bannerUrl,
                    detailImageUrl: detailImageUrl,
                    schedule: scheduleInput ? scheduleInput.value.trim() : (existingCourse.schedule || '매주 토요일 (4주 완성)'),
                    time: timeInput ? timeInput.value.trim() : (existingCourse.time || '10:00 - 13:00 (3시간)'),
                    instructor: instructorInput ? instructorInput.value.trim() : (existingCourse.instructor || '차은정 대표'),
                    description: detailTextInput.value.trim(),
                    curriculum: existingCourse.curriculum || [
                        { week: 'Week 1', title: 'PM 기초 및 프로젝트 범위(Scope) 설정', desc: '프로젝트 라이프사이클의 이해 WBS(작업분할구조도) 실습.' },
                        { week: 'Week 2', title: '프로젝트 일정 및 리스크 관리', desc: '의존성 분석을 통한 일정 네트워크 설계, 리스크 식별 및 정량/정성 평가 기법.' },
                        { week: 'Week 3', title: '애자일 방법론 & 스크럼 실무', desc: '애자일 선언과 4대 가치 이해, 스크럼 프레임워크(스프린트 기획, 데일리 스크럼) 실습.' },
                        { week: 'Week 4', title: '협업 툴 실습 (Jira & Confluence)', desc: 'Jira 백로그 작성 및 스프린트 구동, Confluence 문서 협업 실습.' }
                    ]
                };

                // 2. Update popupConfig if enabled
                const isPopupEnabled = document.getElementById('popup-config-enabled').checked;
                if (isPopupEnabled) {
                    const contentVal = (contentInput && contentInput.value.trim()) || syncCourse.description || '강좌 공지사항입니다.';
                    const linkUrlVal = (linkUrlInput && linkUrlInput.value.trim()) || `project-contents.html?id=${id}`;
                    
                    popupConfig = {
                        enabled: true,
                        title: syncCourse.title,
                        content: contentVal,
                        imageUrl: bannerUrl,
                        linkUrl: linkUrlVal,
                        linkProjectId: id
                    };
                } else {
                    if (popupConfig && popupConfig.linkProjectId === id) {
                        popupConfig.enabled = false;
                    }
                }

                if (editingCourseId) {
                    coursesData = coursesData.map(c => c.id === editingCourseId ? syncCourse : c);
                } else {
                    coursesData.push(syncCourse);
                }
                
                safeSaveToLocalStorage('popupConfig', popupConfig);
                safeSaveToLocalStorage('coursesData', coursesData);
                safeSaveToLocalStorage('hasUnsavedChanges', 'true');
                
                saveAllData('강좌 설정이 성공적으로 저장되었습니다.');
            } catch (err) {
                console.error('saveIntegratedConfig 오류:', err);
                alert('강좌 저장 처리 중 브라우저 스크립트 에러 발생:\n' + err.message);
            }
        };

        window.deleteCourse = function(courseId) {

                alert('최소 1개 이상의 강좌가 유지되어야 하므로 이 강좌를 삭제할 수 없습니다.');

            if (!confirm('정말로 이 강좌를 삭제하시겠습니까? (강좌의 모든 내용이 완전히 삭제됩니다.)')) return;
            
            coursesData = coursesData.filter(c => c.id !== courseId);
            if (popupConfig && popupConfig.linkProjectId === courseId) {
                popupConfig.enabled = false;
                popupConfig.linkProjectId = '';
                safeSaveToLocalStorage('popupConfig', popupConfig);
            }
            
            safeSaveToLocalStorage('coursesData', coursesData);
            saveAllData('강좌가 성공적으로 삭제되었습니다.');

        function saveAllData(successMsg) {
            const payload = {
                portfolioData,
                journeyData,
                competenciesData,
                popupConfig,
                coursesData
            };
            
            fetch('/api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => {
                if (!res.ok) {
                    return res.text().then(text => {
                        let errMsg = '서버 저장 실패';
                        try {
                            const errJson = JSON.parse(text);
                            errMsg = errJson.error || errMsg;
                        } catch (e) {
                            errMsg = text || errMsg;
                        }
                        throw new Error(errMsg + ' (상태 코드: ' + res.status + ')');
                    });
                }
                return res.json();
            })
            .then(result => {
                alert(successMsg || '강좌 데이터가 성공적으로 저장되었습니다.');
                safeSaveToLocalStorage('hasUnsavedChanges', 'false');
                const banner = document.getElementById('unsaved-warning-banner');
                if (banner) banner.remove();
                
                if (result.coursesData) {
                    coursesData = result.coursesData;
                    safeSaveToLocalStorage('coursesData', coursesData);
                }
                if (result.popupConfig) {
                    popupConfig = result.popupConfig;
                    safeSaveToLocalStorage('popupConfig', popupConfig);
                }
                loadApplicantsAndRender();
            })
            .catch(err => {
                console.warn('서버 저장 실패 (오프라인 혹은 정적 호스팅 환경일 수 있습니다):', err);
                alert('강좌 데이터가 로컬 브라우저에 임시 저장되었습니다.\n\n⚠️ 중요: 변경 내용을 최종 반영하려면 상단 배너의 "서버 업데이트" 단추를 클릭해 주세요!');
                safeSaveToLocalStorage('hasUnsavedChanges', 'true');
                showUnsavedWarningBanner();
                loadApplicantsAndRender();
            });
        }

        window.deleteApplication = function(index) {
            if (!confirm('이 수강 신청 내역을 완전히 삭제하시겠습니까?')) return;
            
            fetch('/api/applications/delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ index })
            })
            .then(res => {
                if (!res.ok) throw new Error('서버 삭제 실패');
                return res.json();
            })
            .then(() => {
                loadApplicantsAndRender();
            })
            .catch(err => {
                console.error(err);
                try {
                    let localApps = JSON.parse(localStorage.getItem('courseApplications') || '[]');
                    if (index >= 0 && index < localApps.length) {
                        localApps.splice(index, 1);
                        safeSaveToLocalStorage('courseApplications', localApps);
                    }
                } catch (e) {
                    console.error(e);
                }
                loadApplicantsAndRender();
            });
        };

        window.updateServerGithub = function() {
            const config = JSON.parse(localStorage.getItem('githubConfig'));
            if (!config || !config.pat || !config.owner || !config.repo || !config.branch || !config.path) {
                alert('먼저 "GitHub 연동 설정"을 완료해 주세요.');
                openGithubConfigModal();
                return;
            }
            
            const syncBtn = document.getElementById('btn-github-sync');
            const originalText = syncBtn.innerHTML;
            syncBtn.disabled = true;
            syncBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin" style="margin-right: 0.25rem;"></i>서버 업데이트 중...';
            
            const headers = {
                'Authorization': `token ${config.pat}`,
                'Accept': 'application/vnd.github.v3+json',
                'Content-Type': 'application/json'
            };
            
            const pathParts = config.path.split('/');
            pathParts.pop(); 
            const parentPath = pathParts.length > 0 ? pathParts.join('/') + '/' : '';
            
            const syncPromises = [];
            
            // 1. 팝업 이미지 동기화
            if (popupConfig && popupConfig.imageUrl && popupConfig.imageUrl.startsWith('data:image/')) {
                const matches = popupConfig.imageUrl.match(/^data:image\/([a-zA-Z0-9+]+);base64,(.+)$/);
                if (matches && matches.length === 3) {
                    const base64Data = matches[2];
                    const githubImagePath = `${parentPath}images/popup-image.jpg`;
                    const imageApiUrl = `https://api.github.com/repos/${config.owner}/${config.repo}/contents/${githubImagePath}`;
                    
                    const popupImgPromise = fetch(`${imageApiUrl}?ref=${config.branch}`, { headers })
                        .then(res => {
                            if (res.status === 404) return { sha: null };
                            if (!res.ok) throw new Error(`팝업 이미지 SHA 조회 실패 (코드: ${res.status})`);
                            return res.json();
                        })
                        .then(fileMeta => {
                            const sha = fileMeta.sha;
                            const commitPayload = {
                                message: `upload popup image: popup-image.jpg`,
                                content: base64Data,
                                branch: config.branch
                            };
                            if (sha) commitPayload.sha = sha;
                            return fetch(imageApiUrl, { method: 'PUT', headers, body: JSON.stringify(commitPayload) });
                        })
                        .then(res => {
                            if (!res.ok) {
                                return res.text().then(text => {
                                    throw new Error(`GitHub 팝업 이미지 업로드 실패 (코드: ${res.status}, 사유: ${text})`);
                                });
                            }
                            popupConfig.imageUrl = `images/popup-image.jpg`;
                            safeSaveToLocalStorage('popupConfig', popupConfig);
                        });
                    syncPromises.push(popupImgPromise);
                }
            }
            
            // 2. 강좌 배너 및 세부내용 이미지 동기화
            coursesData.forEach(c => {
                // 2-1. 배너 이미지 동기화
                if (c.bannerUrl && c.bannerUrl.startsWith('data:image/')) {
                    const matches = c.bannerUrl.match(/^data:image\/([a-zA-Z0-9+]+);base64,(.+)$/);
                    if (matches && matches.length === 3) {
                        const base64Data = matches[2];
                        const githubImagePath = `${parentPath}images/course-banner-${c.id}.jpg`;
                        const imageApiUrl = `https://api.github.com/repos/${config.owner}/${config.repo}/contents/${githubImagePath}`;
                        
                        const courseImgPromise = fetch(`${imageApiUrl}?ref=${config.branch}`, { headers })
                            .then(res => {
                                if (res.status === 404) return { sha: null };
                                return res.json();
                            })
                            .then(fileMeta => {
                                const sha = fileMeta.sha;
                                const commitPayload = {
                                    message: `upload course banner: course-banner-${c.id}.jpg`,
                                    content: base64Data,
                                    branch: config.branch
                                };
                                if (sha) commitPayload.sha = sha;
                                return fetch(imageApiUrl, { method: 'PUT', headers, body: JSON.stringify(commitPayload) });
                            })
                            .then(res => {
                                if (!res.ok) throw new Error('GitHub 강좌 이미지 업로드 실패');
                                c.bannerUrl = `images/course-banner-${c.id}.jpg`;
                                safeSaveToLocalStorage('coursesData', coursesData);
                            });
                        syncPromises.push(courseImgPromise);
                    }
                }

                // 2-2. 세부내용 이미지 동기화
                if (c.detailImageUrl && c.detailImageUrl.startsWith('data:image/')) {
                    const matches = c.detailImageUrl.match(/^data:image\/([a-zA-Z0-9+]+);base64,(.+)$/);
                    if (matches && matches.length === 3) {
                        const base64Data = matches[2];
                        const githubImagePath = `${parentPath}images/course-detail-${c.id}.jpg`;
                        const imageApiUrl = `https://api.github.com/repos/${config.owner}/${config.repo}/contents/${githubImagePath}`;
                        
                        const courseDetailImgPromise = fetch(`${imageApiUrl}?ref=${config.branch}`, { headers })
                            .then(res => {
                                if (res.status === 404) return { sha: null };
                                return res.json();
                            })
                            .then(fileMeta => {
                                const sha = fileMeta.sha;
                                const commitPayload = {
                                    message: `upload course detail image: course-detail-${c.id}.jpg`,
                                    content: base64Data,
                                    branch: config.branch
                                };
                                if (sha) commitPayload.sha = sha;
                                return fetch(imageApiUrl, { method: 'PUT', headers, body: JSON.stringify(commitPayload) });
                            })
                            .then(res => {
                                if (!res.ok) throw new Error('GitHub 강좌 세부 이미지 업로드 실패');
                                c.detailImageUrl = `images/course-detail-${c.id}.jpg`;
                                safeSaveToLocalStorage('coursesData', coursesData);
                            });
                        syncPromises.push(courseDetailImgPromise);
                    }
                }
            });
            
            Promise.all(syncPromises)
                .then(() => {
                    const url = `https://api.github.com/repos/${config.owner}/${config.repo}/contents/${config.path}?ref=${config.branch}`;
                    return fetch(url, { headers });
                })
                .then(res => {
                    if (res.status === 404) return { sha: null };
                    return res.json();
                })
                .then(fileMeta => {
                    const sha = fileMeta.sha;
                    const dataPayload = {
                        portfolioData,
                        journeyData,
                        competenciesData,
                        popupConfig,
                        courseConfig: coursesData[0] || null,
                        coursesData
                    };
                    const jsonStr = JSON.stringify(dataPayload, null, 2);
                    const base64Content = btoa(unescape(encodeURIComponent(jsonStr)));
                    
                    const commitPayload = {
                        message: `chore: update data.json via admin interface [${new Date().toLocaleDateString()}]`,
                        content: base64Content,
                        branch: config.branch
                    };
                    if (sha) commitPayload.sha = sha;
                    
                    return fetch(`https://api.github.com/repos/${config.owner}/${config.repo}/contents/${config.path}`, {
                        method: 'PUT',
                        headers,
                        body: JSON.stringify(commitPayload)
                    });
                })
                .then(res => {
                    if (!res.ok) throw new Error('GitHub data.json 커밋 실패');
                    localStorage.setItem('hasUnsavedChanges', 'false');
                    const banner = document.getElementById('unsaved-warning-banner');
                    if (banner) banner.remove();
                    
                    alert('성공적으로 GitHub 저장소에 데이터와 배너 이미지를 업로드하여 서버를 업데이트했습니다!');
                })
                .catch(err => {
                    console.error(err);
                    alert(`서버 업데이트 중 오류 발생: ${err.message}`);
                })
                .finally(() => {
                    syncBtn.disabled = false;
                    syncBtn.innerHTML = originalText;
                });
        };

        window.downloadUploadedDataJson = function() {
            const config = JSON.parse(localStorage.getItem('githubConfig'));
            let downloadUrl = 'data.json';
            
            if (config && config.owner && config.repo && config.branch && config.path) {
                downloadUrl = `https://raw.githubusercontent.com/${config.owner}/${config.repo}/${config.branch}/${config.path}?t=${Date.now()}`;
            }
            
            fetch(downloadUrl)
                .then(res => {
                    if (!res.ok) throw new Error('GitHub 백업 다운로드 실패');
                    return res.json();
                })
                .then(data => {
                    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data, null, 2));
                    const downloadAnchor = document.createElement('a');
                    downloadAnchor.setAttribute("href", dataStr);
                    downloadAnchor.setAttribute("download", "data.json");
                    document.body.appendChild(downloadAnchor);
                    downloadAnchor.click();
                    downloadAnchor.remove();
                })
                .catch(err => {
                    console.warn('원격 백업 실패, 로컬 임시 데이터 다운로드 실행:', err);
                    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({
                        portfolioData,
                        journeyData,
                        competenciesData,
                        popupConfig,
                        coursesData
                    }, null, 2));
                    const downloadAnchor = document.createElement('a');
                    downloadAnchor.setAttribute("href", dataStr);
                    downloadAnchor.setAttribute("download", "data.json");
                    document.body.appendChild(downloadAnchor);
                    downloadAnchor.click();
                    downloadAnchor.remove();
                });
        };

        window.resetAllToDefault = function() {
            if (confirm('모든 데이터를 초기값으로 재설정하시겠습니까?\n(로컬 브라우저 세션 정보가 비워지며 원래의 기본 템플릿 정보로 초기화됩니다.)')) {
                localStorage.clear();
                sessionStorage.setItem('isAdminMode', 'true');
                localStorage.setItem('isAdminMode', 'true');
                alert('데이터 초기화 완료. 페이지를 새로고침합니다.');
                window.location.reload();
            }
        };

    </script>
</body>
</html>
