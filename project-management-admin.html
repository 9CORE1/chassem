<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강좌 및 신청 관리자 센터 | 차은정</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Favicon -->
    <link rel="icon" href="images/favicon.png" type="image/png">
    
    <!-- Stylesheet -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="dark-mode">

    <!-- Admin Mode Banner -->
    <div id="admin-banner" style="position: fixed; top: 0; left: 0; width: 100%; background: linear-gradient(90deg, var(--color-career-start), var(--color-career-end)); color: white; text-align: center; padding: 0.5rem 1rem; font-size: 0.9rem; font-weight: 600; z-index: 9999; box-shadow: 0 4px 10px rgba(0,0,0,0.25); display: flex; align-items: center; justify-content: center; gap: 0.75rem; flex-wrap: wrap;">
        <span>🛠️ 관리자 편집 모드가 활성화되어 있습니다.</span>
        <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
            <button onclick="showPopupConfigForm()" style="background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: white; padding: 0.25rem 0.75rem; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: all 0.2s; display: flex; align-items: center; gap: 0.25rem;"><i class="fa-solid fa-window-restore"></i>팝업창 설정</button>
            <button onclick="openGithubConfigModal()" style="background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: white; padding: 0.25rem 0.75rem; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: all 0.2s;"><i class="fa-brands fa-github" style="margin-right: 0.25rem;"></i>GitHub 연동 설정</button>
            <button onclick="updateServerGithub()" id="btn-github-sync" style="background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: white; padding: 0.25rem 0.75rem; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: all 0.2s;"><i class="fa-solid fa-cloud-arrow-up" style="margin-right: 0.25rem;"></i>서버 업데이트</button>
            <button onclick="downloadUploadedDataJson()" style="background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: white; padding: 0.25rem 0.75rem; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: all 0.2s;"><i class="fa-solid fa-cloud-download" style="margin-right: 0.25rem;"></i>데이터 백업 다운로드</button>
            <button onclick="resetAllToDefault()" style="background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: white; padding: 0.25rem 0.75rem; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: all 0.2s;">초기값으로 재설정</button>
            <button onclick="handleLogout()" style="background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.4); color: white; padding: 0.25rem 0.75rem; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: all 0.2s;"><i class="fa-solid fa-lock" style="margin-right: 0.25rem;"></i>로그아웃</button>
        </div>
    </div>

    <!-- Background decorative elements -->
    <div class="bg-blur-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Header / Navigation -->
    <header id="header" style="top: 35px;">
        <div class="container header-container">
            <a href="index.html" class="logo">
                <span class="logo-accent">EUNJUNG</span>.CHA
            </a>
            
            <nav class="nav-menu" id="nav-menu">
                <ul>
                    <li><a href="index.html#hero" class="nav-link">Home</a></li>
                    <li><a href="index.html#about" class="nav-link">About</a></li>
                    <li><a href="index.html#portfolio" class="nav-link">Portfolio</a></li>
                    <li><a href="index.html#experience" class="nav-link">Timeline</a></li>
                    <li><a href="index.html#contact" class="nav-link">Contact</a></li>
                    <li id="nav-project-mgmt"><a href="project-management-admin.html" class="nav-link active">Project Management</a></li>
                </ul>
            </nav>
            
            <div class="header-actions">
                <button id="theme-toggle" class="theme-toggle-btn" aria-label="화면 테마 변경" title="화면 테마">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="메뉴 열기">
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content: Course & Applicant Admin Section -->
    <main style="padding-top: 140px; min-height: 85vh; background: var(--bg-primary); position: relative; z-index: 10;">
        <div class="container" style="max-width: 1200px; margin: 0 auto; padding: 0 1.5rem 4rem 1.5rem;">
            <!-- Title Header -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem; flex-wrap: wrap; gap: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1.5rem;">
                <div>
                    <span style="font-size: 0.85rem; font-weight: 800; color: var(--color-it-end); letter-spacing: 0.15em; text-transform: uppercase;">ADMIN CONTROL PANEL</span>
                    <h2 style="font-size: 2.2rem; font-weight: 800; background: linear-gradient(135deg, var(--text-primary), var(--text-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-top: 0.25rem;">강좌 등록 및 운영 관리 시스템</h2>
                </div>
                <div style="display: flex; gap: 0.75rem;">
                    <button onclick="showCourseForm()" class="btn btn-primary" style="background: linear-gradient(135deg, var(--color-career-start), var(--color-career-end)); border: none; color: white; padding: 0.65rem 1.25rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; border-radius: 8px; cursor: pointer; transition: all 0.3s;">
                        <i class="fa-solid fa-plus"></i> 신규 강좌 등록
                    </button>
                    <a href="index.html" class="btn btn-outline" style="padding: 0.65rem 1.25rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; border-radius: 8px; border: 1px solid var(--border-color); background: transparent; color: var(--text-primary); text-decoration: none; transition: all 0.3s;">
                        <i class="fa-solid fa-house"></i> 메인 홈으로
                    </a>
                </div>
            </div>

            <!-- Dynamic Workspace Grid -->
            <div id="course-admin-dashboard">
                <div style="text-align: center; padding: 3rem; color: var(--text-muted);">
                    <i class="fa-solid fa-spinner fa-spin fa-2x" style="margin-bottom: 1rem;"></i>
                    <p>데이터 로딩 중...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Admin Edit Modal -->
    <div id="admin-modal" class="modal-overlay" aria-hidden="true" role="dialog" style="z-index: 10000;">
        <div class="modal-content" style="padding: 2.5rem; max-width: 650px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">
                <h3 id="admin-modal-title" style="font-size: 1.5rem; font-weight: 700; color: var(--text-primary);">관리자 편집</h3>
                <button onclick="closeAdminModal()" style="font-size: 2rem; cursor: pointer; color: var(--text-muted); background: none; border: none;">&times;</button>
            </div>
            <div id="admin-modal-body" style="max-height: 60vh; overflow-y: auto; padding-right: 0.5rem; scrollbar-width: thin;">
                <!-- Dynamic form rendering -->
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer style="padding: 2.5rem 0; border-top: 1px solid var(--border-color); background: var(--bg-secondary); position: relative; z-index: 10;">
        <div class="container" style="max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
            <p style="font-size: 0.85rem; color: var(--text-muted);">&copy; 2026 차은정. All rights reserved.</p>
            <div style="display: flex; gap: 1rem;">
                <a href="mailto:cejp731@gmail.com" style="color: var(--text-muted); font-size: 1.1rem; transition: color 0.2s;"><i class="fa-solid fa-envelope"></i></a>
                <a href="https://youtube.com" target="_blank" style="color: var(--text-muted); font-size: 1.1rem; transition: color 0.2s;"><i class="fa-brands fa-youtube"></i></a>
            </div>
        </div>
    </footer>

    <!-- Script Block -->
    <script>
        // 1. Authorization check
        if (sessionStorage.getItem('isAdminMode') !== 'true') {
            alert('관리자 로그인이 필요합니다. 메인 페이지로 이동합니다.');
            window.location.href = 'index.html';
        }

        // Global State variables
        let coursesData = [];
        let portfolioData = [];
        let journeyData = [];
        let competenciesData = [];
        let popupConfig = {};

        // 2. Theme Initialization
        const themeToggle = document.getElementById('theme-toggle');
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            document.body.classList.remove('dark-mode');
            document.body.classList.add('light-mode');
            if (themeToggle) themeToggle.innerHTML = '<i class="fa-solid fa-sun"></i>';
        } else {
            document.body.classList.remove('light-mode');
            document.body.classList.add('dark-mode');
            if (themeToggle) themeToggle.innerHTML = '<i class="fa-solid fa-moon"></i>';
        }

        if (themeToggle) {
            themeToggle.addEventListener('click', () => {
                if (document.body.classList.contains('light-mode')) {
                    document.body.classList.remove('light-mode');
                    document.body.classList.add('dark-mode');
                    themeToggle.innerHTML = '<i class="fa-solid fa-moon"></i>';
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.body.classList.remove('dark-mode');
                    document.body.classList.add('light-mode');
                    themeToggle.innerHTML = '<i class="fa-solid fa-sun"></i>';
                    localStorage.setItem('theme', 'light');
                }
            });
        }

        // 3. Mobile Menu Toggle
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const navMenu = document.getElementById('nav-menu');
        if (mobileMenuBtn && navMenu) {
            mobileMenuBtn.addEventListener('click', () => {
                mobileMenuBtn.classList.toggle('active');
                navMenu.classList.toggle('active');
            });
        }

        // Logout
        function handleLogout() {
            sessionStorage.removeItem('isAdminMode');
            alert('관리자 센터에서 로그아웃 되었습니다.');
            window.location.href = 'index.html';
        }

        // 4. Data Loading
        document.addEventListener('DOMContentLoaded', () => {
            fetch('data.json')
                .then(res => {
                    if (!res.ok) throw new Error('서버 데이터 로드 실패');
                    return res.json();
                })
                .then(data => {
                    portfolioData = data.portfolioData || [];
                    journeyData = data.journeyData || [];
                    competenciesData = data.competenciesData || [];
                    popupConfig = data.popupConfig || {};
                    coursesData = data.coursesData || [];
                    
                    if (coursesData.length === 0 && data.courseConfig) {
                        coursesData = [{ id: "project-management", ...data.courseConfig }];
                    }
                    
                    localStorage.setItem('coursesData', JSON.stringify(coursesData));
                    loadApplicantsAndRender();
                })
                .catch(err => {
                    console.warn('data.json 로드 실패, 로컬 백업 복원:', err);
                    const localCourses = localStorage.getItem('coursesData');
                    if (localCourses) {
                        coursesData = JSON.parse(localCourses);
                    }
                    loadApplicantsAndRender();
                });
        });

        function loadApplicantsAndRender() {
            fetch('/api/applications')
                .then(res => {
                    if (!res.ok) throw new Error('신청 목록 로드 실패');
                    return res.json();
                })
                .then(apps => {
                    renderCourseAdminDashboardWithApps(apps);
                })
                .catch(err => {
                    console.warn('신청 목록 로드 실패, 로컬 스토리지 확인:', err);
                    const localApps = JSON.parse(localStorage.getItem('courseApplications') || '[]');
                    renderCourseAdminDashboardWithApps(localApps);
                });
        }

        function renderCourseAdminDashboardWithApps(apps) {
            const dashboardContainer = document.getElementById('course-admin-dashboard');
            if (!dashboardContainer) return;
            
            // Build Course Cards List
            let coursesHtml = '';
            coursesData.forEach(c => {
                coursesHtml += `
                    <div class="glass-panel" style="padding: 1.5rem; border-radius: 20px; background: var(--bg-secondary); border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 1.25rem;">
                        <!-- Miniature Page Preview (썸네일) -->
                        <div style="width: 100%; border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; background: var(--bg-primary); position: relative; box-shadow: var(--shadow-sm); aspect-ratio: 16 / 10; display: flex; flex-direction: column;">
                            <!-- Title bar mockup -->
                            <div style="background: rgba(0,0,0,0.25); padding: 0.4rem 0.6rem; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 0.35rem; font-size: 0.65rem; color: var(--text-muted);">
                                <i class="fa-solid fa-circle" style="color: #ff5f56; font-size: 8px;"></i>
                                <i class="fa-solid fa-circle" style="color: #ffbd2e; font-size: 8px;"></i>
                                <i class="fa-solid fa-circle" style="color: #27c93f; font-size: 8px;"></i>
                                <span style="margin-left: 0.5rem; font-family: monospace; font-size: 0.6rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 70%;">project-contents.html?id=${c.id}</span>
                            </div>
                            <!-- Page Contents Mini Render -->
                            <div style="padding: 0.6rem; flex: 1; display: flex; flex-direction: column; gap: 0.4rem; overflow: hidden; font-size: 0.7rem; line-height: 1.2;">
                                <!-- Mini Tag & Title -->
                                <div>
                                    <span style="font-size: 0.5rem; font-weight: 800; color: var(--color-it-end); text-transform: uppercase; background: rgba(225,0,255,0.08); padding: 0.1rem 0.3rem; border-radius: 4px;">${c.tag || '일반 강좌'}</span>
                                    <h4 style="font-size: 0.75rem; font-weight: 800; color: var(--text-primary); margin-top: 0.15rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${c.title}</h4>
                                </div>
                                <!-- Mini Banner Image -->
                                <div style="width: 100%; height: 50px; border-radius: 6px; overflow: hidden; border: 1px solid var(--border-color); background: var(--bg-tertiary);">
                                    <img src="${c.bannerUrl || 'images/project_management_banner.jpg'}" style="width: 100%; height: 100%; object-fit: cover;">
                                </div>
                                <!-- Mini Columns -->
                                <div style="display: flex; gap: 0.4rem; flex: 1; overflow: hidden;">
                                    <!-- Left: Info, Desc, Cur -->
                                    <div style="flex: 2; display: flex; flex-direction: column; gap: 0.3rem; min-width: 0;">
                                        <!-- Mini Quick Info -->
                                        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.2rem; font-size: 0.55rem; color: var(--text-secondary); background: rgba(255,255,255,0.02); padding: 0.2rem; border-radius: 4px; border: 1px solid rgba(255,255,255,0.05);">
                                            <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"><i class="fa-solid fa-calendar-days" style="font-size: 7px; color: var(--color-it-end); margin-right: 0.15rem;"></i>${c.schedule.split(' ')[0]}</span>
                                            <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"><i class="fa-solid fa-clock" style="font-size: 7px; color: var(--color-it-end); margin-right: 0.15rem;"></i>${c.time.split(' ')[0]}</span>
                                            <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"><i class="fa-solid fa-user" style="font-size: 7px; color: var(--color-it-end); margin-right: 0.15rem;"></i>${c.instructor.split(' ')[0]}</span>
                                        </div>
                                        <!-- Mini Description -->
                                        <p style="font-size: 0.55rem; color: var(--text-secondary); margin: 0; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">
                                            ${c.description}
                                        </p>
                                        <!-- Mini Curriculum Weeks -->
                                        <div style="display: flex; flex-direction: column; gap: 0.15rem;">
                                            ${(c.curriculum || []).slice(0, 2).map(weekItem => `
                                                <div style="font-size: 0.5rem; display: flex; align-items: center; gap: 0.25rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-secondary);">
                                                    <span style="font-weight:800; color:var(--color-it-end); font-size: 0.5rem;">${weekItem.week}:</span>
                                                    <span style="overflow:hidden; text-overflow:ellipsis;">${weekItem.title}</span>
                                                </div>
                                            `).join('')}
                                        </div>
                                    </div>
                                    <!-- Right: Form mockup -->
                                    <div style="flex: 1; border: 1px solid var(--border-color); border-radius: 6px; background: rgba(255,255,255,0.02); padding: 0.3rem; display: flex; flex-direction: column; gap: 0.25rem; justify-content: center; align-items: center; min-width: 60px;">
                                        <div style="width: 100%; height: 3px; background: var(--border-color); border-radius: 1px;"></div>
                                        <div style="width: 80%; height: 3px; background: var(--border-color); border-radius: 1px;"></div>
                                        <div style="width: 90%; height: 3px; background: var(--border-color); border-radius: 1px;"></div>
                                        <div style="width: 100%; height: 8px; background: linear-gradient(135deg, var(--color-it-start), var(--color-it-end)); border-radius: 2px; margin-top: 0.2rem;"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Action buttons -->
                        <div style="display: flex; gap: 0.5rem; border-top: 1px solid var(--border-color); padding-top: 0.75rem;">
                            <button onclick="showCourseForm('${c.id}')" class="btn btn-outline" style="flex: 1; font-size: 0.8rem; padding: 0.5rem; display: flex; align-items: center; justify-content: center; gap: 0.35rem; border-radius: 6px; cursor: pointer;">
                                <i class="fa-solid fa-edit"></i> 수정
                            </button>
                            <button onclick="deleteCourse('${c.id}')" class="btn btn-outline" style="font-size: 0.8rem; padding: 0.5rem; color: #f43f5e; border-color: rgba(244,63,94,0.2); display: flex; align-items: center; justify-content: center; border-radius: 6px; cursor: pointer;">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                            <a href="project-contents.html?id=${c.id}" target="_blank" class="btn btn-outline" style="flex: 1; font-size: 0.8rem; padding: 0.5rem; display: flex; align-items: center; justify-content: center; gap: 0.35rem; text-align: center; border-radius: 6px; color: var(--text-primary); text-decoration: none;">
                                <i class="fa-solid fa-arrow-up-right-from-square"></i> 보기
                            </a>
                        </div>
                    </div>
                `;
            });
            
            // Dropdown options
            let selectOptionsHtml = '<option value="all">전체 신청 내역 보기</option>';
            coursesData.forEach(c => {
                selectOptionsHtml += `<option value="${c.title}">${c.title}</option>`;
            });
            
            dashboardContainer.innerHTML = `
                <!-- Courses Grid Container -->
                <div style="margin-bottom: 3rem;">
                    <h3 style="font-size: 1.35rem; font-weight: 700; color: var(--text-primary); margin-bottom: 1.2rem; display: flex; align-items: center; gap: 0.5rem;">
                        <span style="display:inline-block; width:4px; height:18px; background:var(--color-it-end); border-radius:2px;"></span> 운영 강좌 목록
                    </h3>
                    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem;">
                        ${coursesHtml}
                    </div>
                </div>
                
                <!-- Applicants Section -->
                <div>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem; flex-wrap: wrap; gap: 1rem;">
                        <h3 style="font-size: 1.35rem; font-weight: 700; color: var(--text-primary); display: flex; align-items: center; gap: 0.5rem;">
                            <span style="display:inline-block; width:4px; height:18px; background:var(--color-it-end); border-radius:2px;"></span> 수강 신청 현황
                        </h3>
                        <div>
                            <select id="applicants-filter" onchange="filterApplicantsTable()" style="padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-secondary); color: var(--text-primary); font-size: 0.85rem; font-weight: 600; cursor: pointer; outline: none;">
                                ${selectOptionsHtml}
                            </select>
                        </div>
                    </div>
                    
                    <div class="glass-panel" style="border-radius: 16px; background: var(--bg-secondary); border: 1px solid var(--border-color); overflow: hidden;">
                        <div style="width: 100%; overflow-x: auto;">
                            <table style="width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem;">
                                <thead>
                                    <tr style="border-bottom: 2px solid var(--border-color); color: var(--text-secondary); font-weight: 600; background: rgba(0,0,0,0.15);">
                                        <th style="padding: 0.9rem 1rem;">이름</th>
                                        <th style="padding: 0.9rem 1rem;">연락처</th>
                                        <th style="padding: 0.9rem 1rem;">이메일</th>
                                        <th style="padding: 0.9rem 1rem;">신청 강좌</th>
                                        <th style="padding: 0.9rem 1rem;">문의사항</th>
                                        <th style="padding: 0.9rem 1rem;">신청일시</th>
                                        <th style="padding: 0.9rem 1rem; text-align: center;">관리</th>
                                    </tr>
                                </thead>
                                <tbody id="applicants-table-body">
                                    <!-- Populated dynamically -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
            
            window.currentApplicants = apps;
            filterApplicantsTable();
        }

        window.filterApplicantsTable = function() {
            const filterSelect = document.getElementById('applicants-filter');
            const tableBody = document.getElementById('applicants-table-body');
            if (!tableBody || !window.currentApplicants) return;

        window.saveCourse = function(e, courseId) {
            e.preventDefault();
            
            const previewImg = document.getElementById('course-banner-preview');
            const updatedCurriculum = [];
            for (let i = 0; i < 4; i++) {
                updatedCurriculum.push({
                    week: `Week ${i + 1}`,
                    title: document.getElementById(`curriculum-title-${i}`).value,
                    desc: document.getElementById(`curriculum-desc-${i}`).value
                });
            }
            
            const coursePayload = {
                id: courseId,
                tag: document.getElementById('course-input-tag').value,
                title: document.getElementById('course-input-title').value,
                bannerUrl: previewImg ? previewImg.src : 'images/project_management_banner.jpg',
                schedule: document.getElementById('course-input-schedule').value,
                time: document.getElementById('course-input-time').value,
                instructor: document.getElementById('course-input-instructor').value,
                description: document.getElementById('course-input-desc').value,
                curriculum: updatedCurriculum
            };
            
            const idx = coursesData.findIndex(c => c.id === courseId);
            if (idx !== -1) {
                coursesData[idx] = coursePayload;
            } else {
                coursesData.push(coursePayload);
            }
            
            localStorage.setItem('coursesData', JSON.stringify(coursesData));
            saveAllData();
        };

        function saveAllData(successMsg) {
            const payload = {
                portfolioData,
                journeyData,
                competenciesData,
                popupConfig,
                coursesData
            };
            
            fetch('/api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => {
                if (!res.ok) throw new Error('서버 저장 실패');
                return res.json();
            })
            .then(result => {
                alert(successMsg || '강좌 데이터가 성공적으로 저장되었습니다.');
                if (result.coursesData) {
                    coursesData = result.coursesData;
                    localStorage.setItem('coursesData', JSON.stringify(coursesData));
                }
                loadApplicantsAndRender();
            })
            .catch(err => {
                console.error(err);
                alert('데이터 저장 실패 (로컬 백업 저장 완료)');
                loadApplicantsAndRender();
            });
        }

        window.deleteCourse = function(courseId) {
            if (coursesData.length <= 1) {
                alert('최소 1개 이상의 강좌가 유지되어야 하므로 이 강좌를 삭제할 수 없습니다.');
                return;
            }
            if (!confirm('이 강좌를 삭제하시겠습니까? (강좌의 모든 내용이 완전히 삭제됩니다.)')) return;
            
            coursesData = coursesData.filter(c => c.id !== courseId);
            localStorage.setItem('coursesData', JSON.stringify(coursesData));
            saveAllData();
        };

        window.handleCourseBannerFileChange = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            if (file.size > 5 * 1024 * 1024) {
                alert('이미지 크기는 최대 5MB를 초과할 수 없습니다.');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const previewContainer = document.getElementById('course-banner-preview-container');
                if (previewContainer) {
                    previewContainer.innerHTML = `<img id="course-banner-preview" src="${e.target.result}" style="width: 100%; height: 100%; object-fit: cover;">`;
                }
            };
            reader.readAsDataURL(file);
        };

        window.deleteApplication = function(index) {
            if (!confirm('이 수강 신청 내역을 완전히 삭제하시겠습니까?')) return;
            
            fetch('/api/applications/delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ index })
            })
            .then(res => {
                if (!res.ok) throw new Error('서버 삭제 실패');
                return res.json();
            })
            .then(() => {
                loadApplicantsAndRender();
            })
            .catch(err => {
                console.error(err);
                try {
                    let localApps = JSON.parse(localStorage.getItem('courseApplications') || '[]');
                    if (index >= 0 && index < localApps.length) {
                        localApps.splice(index, 1);
                        localStorage.setItem('courseApplications', JSON.stringify(localApps));
                    }
                } catch (e) {
                    console.error(e);
                }
                loadApplicantsAndRender();
            });
        };

                title: document.getElementById('popup-config-title').value,
                content: document.getElementById('popup-config-content').value,
                imageUrl: (previewImg && previewImg.src.startsWith('data:') || previewImg && previewImg.src.startsWith('images/')) ? previewImg.src : '',
                linkUrl: '',
                linkProjectId: document.getElementById('popup-config-link-project').value
            };
            
            localStorage.setItem('popupConfig', JSON.stringify(popupConfig));
            saveAllData('팝업창 설정이 성공적으로 저장되었습니다.');
        };

        window.handlePopupFileChangeInline = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            if (file.size > 5 * 1024 * 1024) {
                alert('이미지 크기는 최대 5MB를 초과할 수 없습니다.');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const previewContainer = document.getElementById('popup-config-img-preview-container');
                const removeBtn = document.getElementById('btn-popup-image-remove');
                if (previewContainer) {
                    previewContainer.innerHTML = `<img id="popup-config-img-preview" src="${e.target.result}" style="width: 100%; height: 100%; object-fit: cover;">`;
                }
                if (removeBtn) {
                    removeBtn.style.display = 'block';
                }
            };
            reader.readAsDataURL(file);
        };

        window.removePopupImageInline = function() {
            const previewContainer = document.getElementById('popup-config-img-preview-container');
            const removeBtn = document.getElementById('btn-popup-image-remove');
            if (previewContainer) {
                previewContainer.innerHTML = '<span style="font-size: 0.75rem; color: var(--text-muted);">이미지 없음</span>';
            }
            if (removeBtn) {
                removeBtn.style.display = 'none';
            }
        };

        window.openGithubConfigModal = function() {
            let config = JSON.parse(localStorage.getItem('githubConfig')) || {
                pat: '',
                owner: '',
                repo: '',
                branch: 'main',
                path: 'data.json'
            };
            
            const formHtml = `
                <form id="github-config-form" style="display: flex; flex-direction: column; gap: 1.2rem;">
                    <div class="form-group">
                        <label style="display: block; margin-bottom: 0.4rem; font-weight: 600; font-size: 0.85rem; color: var(--text-secondary);">GitHub Personal Access Token (PAT)</label>
                        <input type="password" id="gh-pat" value="${config.pat || ''}" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" style="width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-tertiary); color: var(--text-primary);" required>
                    </div>
                    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem;">
                        <div class="form-group">
                            <label style="display: block; margin-bottom: 0.4rem; font-weight: 600; font-size: 0.85rem; color: var(--text-secondary);">저장소 소유자 (Owner)</label>
                            <input type="text" id="gh-owner" value="${config.owner || ''}" placeholder="예: user-id" style="width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-tertiary); color: var(--text-primary);" required>
                        </div>
                        <div class="form-group">
                            <label style="display: block; margin-bottom: 0.4rem; font-weight: 600; font-size: 0.85rem; color: var(--text-secondary);">저장소 이름 (Repo)</label>
                            <input type="text" id="gh-repo" value="${config.repo || ''}" placeholder="예: profile" style="width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-tertiary); color: var(--text-primary);" required>
                        </div>
                    </div>
                    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem;">
                        <div class="form-group">
                            <label style="display: block; margin-bottom: 0.4rem; font-weight: 600; font-size: 0.85rem; color: var(--text-secondary);">브랜치 (Branch)</label>
                            <input type="text" id="gh-branch" value="${config.branch || 'main'}" placeholder="예: main" style="width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-tertiary); color: var(--text-primary);" required>
                        </div>
                        <div class="form-group">
                            <label style="display: block; margin-bottom: 0.4rem; font-weight: 600; font-size: 0.85rem; color: var(--text-secondary);">파일 경로 (Path)</label>
                            <input type="text" id="gh-path" value="${config.path || 'data.json'}" placeholder="예: data.json" style="width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-tertiary); color: var(--text-primary);" required>
                        </div>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
                        <button type="button" onclick="clearGithubConfig()" class="btn btn-outline" style="padding: 0.6rem 1.2rem; font-size: 0.9rem; color: #f43f5e; border-color: rgba(244, 63, 94, 0.3); background: rgba(244, 63, 94, 0.05);">설정 삭제</button>
                        <div style="display: flex; gap: 1rem;">
                            <button type="button" onclick="closeAdminModal()" class="btn btn-outline" style="padding: 0.6rem 1.5rem; font-size: 0.9rem;">취소</button>
                            <button type="submit" class="btn btn-primary" style="padding: 0.6rem 1.5rem; font-size: 0.9rem;">설정 저장</button>
                        </div>
                    </div>
                </form>
            `;
            
            openAdminModal('GitHub 연동 설정', formHtml);
            
            const form = document.getElementById('github-config-form');
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const newConfig = {
                    pat: document.getElementById('gh-pat').value.trim(),
                    owner: document.getElementById('gh-owner').value.trim(),
                    repo: document.getElementById('gh-repo').value.trim(),
                    branch: document.getElementById('gh-branch').value.trim(),
                    path: document.getElementById('gh-path').value.trim()
                };
                localStorage.setItem('githubConfig', JSON.stringify(newConfig));
                alert('GitHub 연동 설정이 로컬 브라우저에 임시 저장되었습니다.');
                closeAdminModal();
            });
        };

        window.clearGithubConfig = function() {
            if (confirm('저장된 모든 GitHub 연동 설정을 삭제하시겠습니까?')) {
                localStorage.removeItem('githubConfig');
                alert('GitHub 연동 설정이 성공적으로 삭제되었습니다.');
                closeAdminModal();
            }
        };

        window.updateServerGithub = function() {
            const config = JSON.parse(localStorage.getItem('githubConfig'));
            if (!config || !config.pat || !config.owner || !config.repo || !config.branch || !config.path) {
                alert('먼저 "GitHub 연동 설정"을 완료해 주세요.');
                openGithubConfigModal();
                return;
            }
            
            const syncBtn = document.getElementById('btn-github-sync');
            const originalText = syncBtn.innerHTML;
            syncBtn.disabled = true;
            syncBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin" style="margin-right: 0.25rem;"></i>서버 업데이트 중...';
            
            const headers = {
                'Authorization': `token ${config.pat}`,
                'Accept': 'application/vnd.github.v3+json',
                'Content-Type': 'application/json'
            };
            
            const pathParts = config.path.split('/');
            pathParts.pop(); 
            const parentPath = pathParts.length > 0 ? pathParts.join('/') + '/' : '';
            
            const syncPromises = [];
            
            // 1. 팝업 이미지 동기화
            if (popupConfig && popupConfig.imageUrl && popupConfig.imageUrl.startsWith('data:image/')) {
                const matches = popupConfig.imageUrl.match(/^data:image\/([a-zA-Z0-9+]+);base64,(.+)$/);
                if (matches && matches.length === 3) {
                    const base64Data = matches[2];
                    const githubImagePath = `${parentPath}images/popup-image.jpg`;
                    const imageApiUrl = `https://api.github.com/repos/${config.owner}/${config.repo}/contents/${githubImagePath}`;
                    
                    const popupImgPromise = fetch(`${imageApiUrl}?ref=${config.branch}`, { headers })
                        .then(res => {
                            if (res.status === 404) return { sha: null };
                            return res.json();
                        })
                        .then(fileMeta => {
                            const sha = fileMeta.sha;
                            const commitPayload = {
                                message: `upload popup image: popup-image.jpg`,
                                content: base64Data,
                                branch: config.branch
                            };
                            if (sha) commitPayload.sha = sha;
                            return fetch(imageApiUrl, { method: 'PUT', headers, body: JSON.stringify(commitPayload) });
                        })
                        .then(res => {
                            if (!res.ok) throw new Error('GitHub 팝업 이미지 업로드 실패');
                            popupConfig.imageUrl = `images/popup-image.jpg`;
                            localStorage.setItem('popupConfig', JSON.stringify(popupConfig));
                        });
                    syncPromises.push(popupImgPromise);
                }
            }
            
            // 2. 강좌 배너 동기화
            coursesData.forEach(c => {
                if (c.bannerUrl && c.bannerUrl.startsWith('data:image/')) {
                    const matches = c.bannerUrl.match(/^data:image\/([a-zA-Z0-9+]+);base64,(.+)$/);
                    if (matches && matches.length === 3) {
                        const base64Data = matches[2];
                        const githubImagePath = `${parentPath}images/course-banner-${c.id}.jpg`;
                        const imageApiUrl = `https://api.github.com/repos/${config.owner}/${config.repo}/contents/${githubImagePath}`;
                        
                        const courseImgPromise = fetch(`${imageApiUrl}?ref=${config.branch}`, { headers })
                            .then(res => {
                                if (res.status === 404) return { sha: null };
                                return res.json();
                            })
                            .then(fileMeta => {
                                const sha = fileMeta.sha;
                                const commitPayload = {
                                    message: `upload course banner: course-banner-${c.id}.jpg`,
                                    content: base64Data,
                                    branch: config.branch
                                };
                                if (sha) commitPayload.sha = sha;
                                return fetch(imageApiUrl, { method: 'PUT', headers, body: JSON.stringify(commitPayload) });
                            })
                            .then(res => {
                                if (!res.ok) throw new Error('GitHub 강좌 이미지 업로드 실패');
                                c.bannerUrl = `images/course-banner-${c.id}.jpg`;
                                localStorage.setItem('coursesData', JSON.stringify(coursesData));
                            });
                        syncPromises.push(courseImgPromise);
                    }
                }
            });
            
            Promise.all(syncPromises)
                .then(() => {
                    const url = `https://api.github.com/repos/${config.owner}/${config.repo}/contents/${config.path}?ref=${config.branch}`;
                    return fetch(url, { headers });
                })
                .then(res => {
                    if (res.status === 404) return { sha: null };
                    return res.json();
                })
                .then(fileMeta => {
                    const sha = fileMeta.sha;
                    const dataPayload = {
                        portfolioData,
                        journeyData,
                        competenciesData,
                        popupConfig,
                        courseConfig: coursesData[0] || null,
                        coursesData
                    };
                    const jsonStr = JSON.stringify(dataPayload, null, 2);
                    const base64Content = btoa(unescape(encodeURIComponent(jsonStr)));
                    
                    const commitPayload = {
                        message: `chore: update data.json via admin interface [${new Date().toLocaleDateString()}]`,
                        content: base64Content,
                        branch: config.branch
                    };
                    if (sha) commitPayload.sha = sha;
                    
                    return fetch(`https://api.github.com/repos/${config.owner}/${config.repo}/contents/${config.path}`, {
                        method: 'PUT',
                        headers,
                        body: JSON.stringify(commitPayload)
                    });
                })
                .then(res => {
                    if (!res.ok) throw new Error('GitHub data.json 커밋 실패');
                    alert('성공적으로 GitHub 저장소에 데이터와 배너 이미지를 업로드하여 서버를 업데이트했습니다!');
                })
                .catch(err => {
                    console.error(err);
                    alert(`서버 업데이트 중 오류 발생: ${err.message}`);
                })
                .finally(() => {
                    syncBtn.disabled = false;
                    syncBtn.innerHTML = originalText;
                });
        };

        window.downloadUploadedDataJson = function() {
            const config = JSON.parse(localStorage.getItem('githubConfig'));
            let downloadUrl = 'data.json';
            
            if (config && config.owner && config.repo && config.branch && config.path) {
                downloadUrl = `https://raw.githubusercontent.com/${config.owner}/${config.repo}/${config.branch}/${config.path}?t=${Date.now()}`;
            }
            
            fetch(downloadUrl)
                .then(res => {
                    if (!res.ok) throw new Error('GitHub 백업 다운로드 실패');
                    return res.json();
                })
                .then(data => {
                    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data, null, 2));
                    const downloadAnchor = document.createElement('a');
                    downloadAnchor.setAttribute("href", dataStr);
                    downloadAnchor.setAttribute("download", "data.json");
                    document.body.appendChild(downloadAnchor);
                    downloadAnchor.click();
                    downloadAnchor.remove();
                })
                .catch(err => {
                    console.warn('원격 백업 실패, 로컬 임시 데이터 다운로드 실행:', err);
                    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({
                        portfolioData,
                        journeyData,
                        competenciesData,
                        popupConfig,
                        coursesData
                    }, null, 2));
                    const downloadAnchor = document.createElement('a');
                    downloadAnchor.setAttribute("href", dataStr);
                    downloadAnchor.setAttribute("download", "data.json");
                    document.body.appendChild(downloadAnchor);
                    downloadAnchor.click();
                    downloadAnchor.remove();
                });
        };

        window.resetAllToDefault = function() {
            if (confirm('모든 데이터를 초기값으로 재설정하시겠습니까?\n(로컬 브라우저 세션 정보가 비워지며 원래의 기본 템플릿 정보로 초기화됩니다.)')) {
                localStorage.clear();
                sessionStorage.setItem('isAdminMode', 'true');
                alert('데이터 초기화 완료. 페이지를 새로고침합니다.');
                window.location.reload();
            }
        };

    </script>
</body>
</html>
